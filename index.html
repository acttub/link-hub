<style>
/* Pretendard — index.html에 쓰인 글자만 서브셋. 문구를 고치면 build-fonts.py를 다시 돌린다.
   이 브랜드의 가장 얇은 굵기는 500이다(Regular 파일이 없고, 그보다 얇으면 희미해서 쓰지 않는다). */
@font-face {
  font-family: Pretendard; font-style: normal; font-weight: 500;
  font-display: swap; src: url(/fonts/pretendard-500.woff2) format("woff2");
}
@font-face {
  font-family: Pretendard; font-style: normal; font-weight: 600;
  font-display: swap; src: url(/fonts/pretendard-600.woff2) format("woff2");
}
@font-face {
  font-family: Pretendard; font-style: normal; font-weight: 700;
  font-display: swap; src: url(/fonts/pretendard-700.woff2) format("woff2");
}

/* ── brand/DESIGN.md 토큰. 값을 바꿀 때는 정본을 먼저 고친다. ──
   라이트 전용이다 — 제품 화면에 어두운 배경을 만들지 않는다. */
:root {
  --neutral: #f2f4f6;
  --surface: #ffffff;
  --surface-sub: #f9fafb;
  --ink: #191f28;
  --ink-sub: #4e5968;
  --ink-tertiary: #6b7684;
  --line: #e5e8eb;
  --primary: #0a79fb;          /* 링크·표식 */
  --primary-strong: #0355f1;   /* 흰 글자를 얹는 면 (AA) */
  --primary-deep: #0243c4;     /* pressed */
  --primary-soft: #e8f3ff;
  --shadow: 0 2px 8px rgba(0, 0, 0, .08);
  --r-md: 12px;   /* 컨트롤 */
  --r-lg: 16px;   /* 그릇 */
  --r-pill: 9999px;
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  padding: 36px 20px calc(28px + env(safe-area-inset-bottom));
  min-height: 100svh;
  background: var(--neutral);
  color: var(--ink);
  font-family: Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 15px;
  font-weight: 500;
  line-height: 1.6;
  word-break: keep-all;
  -webkit-font-smoothing: antialiased;
}
.wrap {
  max-width: 400px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  min-height: calc(100svh - 64px - env(safe-area-inset-bottom));
}

/* ── 프로필 헤더 ── */
.head { text-align: center; margin-bottom: 26px; }
.avatar {
  width: 64px; height: 64px; border-radius: var(--r-lg);
  display: block; margin: 0 auto 14px;
  box-shadow: var(--shadow);
}
.name {
  margin: 0;
  font-size: 22px; font-weight: 700; letter-spacing: -.02em; line-height: 1.36;
}
.tagline {
  margin: 5px 0 0;
  color: var(--ink-sub); font-size: 15px;
}

/* ── 공통 링크 ── */
a.item {
  display: block;
  text-decoration: none;
  color: inherit;
  background: var(--surface);
  box-shadow: var(--shadow);
  -webkit-tap-highlight-color: transparent;
  transition: transform .12s ease-out;
}
/* pressed는 배경색 이동 + scale(0.98)까지. 그림자·크기 연출을 더하지 않는다. */
a.item:active { transform: scale(.98); }
a.item:focus-visible { outline: 1.5px solid var(--primary); outline-offset: 2px; }

/* ── 주 항목 — acttub 코어. 이 계층을 평평하게 만들지 않는다. ── */
.primary {
  border-radius: var(--r-lg);
  padding: 22px 22px 20px;
}
.primary .t {
  margin: 0 0 7px;
  font-size: 20px; font-weight: 600; line-height: 1.4;
}
.primary .d {
  margin: 0 0 18px;
  color: var(--ink-sub); font-size: 15px; line-height: 1.6;
}
.cta {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  height: 52px; border-radius: var(--r-md);
  background: var(--primary-strong); color: #fff;
  font-size: 16px; font-weight: 600;
}
a.item:active .cta { background: var(--primary-deep); }
.cta svg { flex: none; }

/* ── 구분 라벨 ── */
/* neutral 배경 위에서는 ink-tertiary가 4.19:1로 AA에 못 미친다 → ink-sub를 쓴다.
   (ink-tertiary의 AA 보장은 흰 배경 기준이다) */
.label {
  margin: 26px 0 10px;
  padding-left: 4px;
  font-size: 12px; font-weight: 600; color: var(--ink-sub);
}

/* ── 보조 항목 ── */
.row {
  display: flex; align-items: center; gap: 12px;
  border-radius: var(--r-lg);
  padding: 14px 16px;
  margin-bottom: 9px;
}
.row .body { flex: 1; min-width: 0; }
.row .t {
  display: block;
  font-size: 15px; font-weight: 600;
}
.row .d {
  display: block; margin-top: 2px;
  font-size: 13px; color: var(--ink-tertiary); line-height: 1.54;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.badge {
  flex: none;
  font-size: 12px; font-weight: 600; color: var(--primary-strong);
  background: var(--primary-soft);
  border-radius: var(--r-pill); padding: 4px 10px;
  font-variant-numeric: tabular-nums;
}
.chev { flex: none; color: var(--ink-tertiary); }

/* ── 푸터 ── */
.foot { margin-top: auto; padding-top: 26px; text-align: center; }
.foot a {
  display: inline-block; padding: 8px 12px;
  color: var(--ink-sub); text-decoration: none;
  font-size: 13px; font-weight: 600;
  border-radius: 8px;
  -webkit-tap-highlight-color: transparent;
}
.foot a:focus-visible { outline: 1.5px solid var(--primary); outline-offset: 2px; }

/* ── 진입 모션 ──
   80~240ms, ease-out 계열의 곧은 곡선. 탄성·바운스 금지.
   요소를 하나씩 시차로 등장시키는 연출(stagger)은 쓰지 않는다 — 한 번에 들어온다. */
@media (prefers-reduced-motion: no-preference) {
  .rise { animation: rise .22s cubic-bezier(.2, .8, .2, 1) backwards; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }
}
</style>
