<meta name="theme-color" content="#f2f4f6" media="(prefers-color-scheme: light)">

<style>
:root {
  --bg: #f2f4f6; --surface: #ffffff; --surface-sub: #f9fafb;
  --ink: #191f28; --ink-2: #4e5968; --ink-3: #8b95a1;
  --line: #e5e8eb;
  --accent: #0a79fb; --accent-ink: #ffffff; --accent-soft: #e8f3ff;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #101318; --surface: #1b1f27; --surface-sub: #232834;
    --ink: #eceef1; --ink-2: #a8b0bc; --ink-3: #6b7684;
    --line: #2b313c;
    --accent: #4a9eff; --accent-ink: #0b1220; --accent-soft: #1c2b45;
    --shadow: none;
  }
}
:root[data-theme="dark"] {
  --bg: #101318; --surface: #1b1f27; --surface-sub: #232834;
  --ink: #eceef1; --ink-2: #a8b0bc; --ink-3: #6b7684;
  --line: #2b313c;
  --accent: #4a9eff; --accent-ink: #0b1220; --accent-soft: #1c2b45;
  --shadow: none;
}
:root[data-theme="light"] {
  --bg: #f2f4f6; --surface: #ffffff; --surface-sub: #f9fafb;
  --ink: #191f28; --ink-2: #4e5968; --ink-3: #8b95a1;
  --line: #e5e8eb;
  --accent: #0a79fb; --accent-ink: #ffffff; --accent-soft: #e8f3ff;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  padding: 56px 20px calc(48px + env(safe-area-inset-bottom));
  background: var(--bg);
  color: var(--ink);
  font-family: "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 420px; margin: 0 auto; }

/* ── 헤더 ── */
.head { text-align: center; margin-bottom: 36px; }
.mark {
  display: block; width: 60px; height: 60px;
  margin: 0 auto 18px;
}
h1 {
  margin: 0 0 8px;
  font-size: 27px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.3;
}
.tagline { margin: 0; color: var(--ink-2); font-size: 15px; }

/* ── 메인 카드 ── */
.primary {
  display: block; text-decoration: none; color: inherit;
  background: var(--surface); border-radius: 20px;
  padding: 26px 24px 24px;
  box-shadow: var(--shadow);
  -webkit-tap-highlight-color: transparent;
  transition: transform .12s ease;
}
.primary:active { transform: scale(.985); }
.primary h2 {
  margin: 0 0 8px;
  font-size: 21px; font-weight: 700; letter-spacing: -0.02em;
}
.primary p { margin: 0 0 20px; color: var(--ink-2); font-size: 14.5px; }
.btn {
  display: flex; align-items: center; justify-content: center;
  height: 54px; border-radius: 14px;
  background: var(--accent); color: var(--accent-ink);
  font-size: 16px; font-weight: 700; letter-spacing: -0.01em;
}

/* ── 서브 묶음 ── */
.sub-label {
  margin: 40px 0 12px;
  padding-left: 4px;
  font-size: 13px; font-weight: 600; color: var(--ink-3);
}
.row {
  display: flex; align-items: center; gap: 14px;
  text-decoration: none; color: inherit;
  background: var(--surface); border-radius: 16px;
  padding: 17px 18px;
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  -webkit-tap-highlight-color: transparent;
  transition: transform .12s ease;
}
.row:active { transform: scale(.985); }
.row .body { flex: 1; min-width: 0; }
.row .title { display: block; font-size: 15.5px; font-weight: 600; letter-spacing: -0.01em; }
.row .desc { display: block; font-size: 13px; color: var(--ink-3); margin-top: 3px; }
.row .time {
  flex-shrink: 0;
  font-size: 12px; font-weight: 600; color: var(--ink-2);
  background: var(--surface-sub); border-radius: 9999px;
  padding: 5px 11px;
  font-variant-numeric: tabular-nums;
}

/* ── 푸터 ── */
.foot {
  margin-top: 44px; text-align: center;
  font-size: 13px; color: var(--ink-3);
}
.foot a { color: var(--ink-2); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">

  <header class="head">
    <img class="mark" src="logo.png" width="60" height="60" alt="acttub">
    <h1>질문으로 찾는 연기 연습</h1>
    <p class="tagline">답을 주는 대신, 같이 질문합니다.</p>
  </header>

  <main>
    <a class="primary" href="https://acttub.com/?utm_source=linkhub&utm_medium=bio&utm_campaign=hub">
      <h2>acttub 시작하기</h2>
      <p>연기 영상을 올리면 AI가 질문을 건네요. 주고받다 보면 내가 놓쳤던 생각이 내 문장으로 남습니다.</p>
      <span class="btn">무료로 시작하기 →</span>
    </a>

    <p class="sub-label">가볍게 시작해보기</p>

    <a class="row" href="https://voice.acttub.com/?utm_source=linkhub&utm_medium=bio&utm_campaign=hub">
      <span class="body">
        <span class="title">보이스 컬러</span>
        <span class="desc">녹음 한 번으로 찾는 내 목소리 색</span>
      </span>
      <span class="time">30초</span>
    </a>

    <a class="row" href="https://acti.acttub.com/?utm_source=linkhub&utm_medium=bio&utm_campaign=hub">
      <span class="body">
        <span class="title">연기 스타일 유형 찾기</span>
        <span class="desc">12문항으로 보는 나의 연기 색깔</span>
      </span>
      <span class="time">2분</span>
    </a>
  </main>

  <footer class="foot">
    <a href="https://instagram.com/acttub_com">@acttub_com</a>
  </footer>

</div>
</body>
</html>
